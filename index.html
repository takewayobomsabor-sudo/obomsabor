<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Bom Sabor | Takeaway</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
</head>
<body>

    <nav class="navbar">
        <div class="logo">O Bom Sabor</div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fa-solid fa-shopping-basket"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>O Bom Sabor</h1>
            <p>COMIDA TRADICIONAL EM MONTE GORDO</p>
            <button id="btn-abrir-menu" class="btn-principal">Ver Menu e Pedir</button>
        </div>
    </header>

    <section class="seccao-horarios">
        <div class="horario-col">
            <h3><i class="fa-solid fa-clock"></i> Horário de Atendimento</h3>
            <p>Segunda - Domingo: 11:00 - 14:00</p>
            <p>Segunda - Sábado: 18:00 - 21:00</p>
        </div>
        <div class="horario-col">
            <h3><i class="fa-solid fa-utensils"></i> Serviço de Balcão</h3>
            <p>Segunda - Domingo: 11:40 - 13:45</p>
            <p>Segunda - Sábado: 18:45 - 20:40</p>
        </div>
    </section>

    <section class="seccao-mapa">
        <div class="mapa-wrapper">
            <iframe src="https://maps.google.com/?cid=14707494395471687325&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <div id="modal-menu" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>MENU PRINCIPAL</h2>
                <span class="fechar-modal">&times;</span>
            </div>
            <div id="lista-pratos"></div>
            <div id="lista-pizzas"></div>
        </div>
    </div>

    <div id="carrinho-lateral" class="sidebar">
        <div class="sidebar-header">
            <h3>O Meu Pedido</h3>
            <span onclick="toggleCart()">&times;</span>
        </div>
        <div id="itens-lista"></div>
        <div class="sidebar-footer">
            <div class="total">Total: <span id="valor-total">0.00€</span></div>
            <button class="btn-finalizar" onclick="finalizar()">Confirmar Pedido</button>
        </div>
    </div>

    <script src="script.js?v=1.1"></script>
</body>
</html>
