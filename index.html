<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Bom Sabor | Takeaway</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">O Bom Sabor</div>
        <div class="nav-icons">
            <div class="cart-container" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 class="titulo-central">O Bom Sabor</h1>
            <p class="subtitulo">COMIDA TRADICIONAL EM MONTE GORDO</p>
            <button id="btn-menu" class="btn-menu-principal" onclick="abrirModalMenu()">Ver Menu e Pedir</button>
        </div>
    </header>

    <main class="container">
        <section class="horarios-brutal">
            <div class="glass-card">
                <div class="card-header">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <h2>Horários</h2>
                </div>
                
                <div class="horario-content">
                    <div class="horario-group">
                        <span class="group-title">Atendimento Geral</span>
                        <div class="time-row">
                            <span class="day">Segunda a Domingo</span>
                            <span class="hours">11:00 — 14:00</span>
                        </div>
                        <div class="time-row">
                            <span class="day">Segunda a Sábado</span>
                            <span class="hours">18:00 — 21:00</span>
                        </div>
                    </div>

                    <div class="separator-dots"><span></span><span></span><span></span></div>

                    <div class="horario-group">
                        <span class="group-title">Serviço de Balcão</span>
                        <div class="time-row">
                            <span class="day">Segunda a Domingo</span>
                            <span class="hours highlight">11:40 — 13:45</span>
                        </div>
                        <div class="time-row">
                            <span class="day">Segunda a Sábado</span>
                            <span class="hours highlight">18:45 — 20:40</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="mapa-seccao">
            <h2 class="section-title">Onde Estamos</h2>
            <div class="mapa-wrapper">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3184.225547476831!2d-7.4516335!3d37.1821814!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd10168b97f00001%3A0x1d10168b97f00001!2sMonte%20Gordo!5e0!3m2!1spt!2spt!4v1710000000000" 
                width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>
    </main>

    <div id="modal-menu" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Menu Principal</h2>
                <i class="fa-solid fa-xmark" onclick="fecharModalMenu()"></i>
            </div>
            <div id="lista-pratos-dia"></div>
            <div id="lista-pizzas"></div>
        </div>
    </div>

    <div id="cart-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Cesto</h3>
            <i class="fa-solid fa-xmark" onclick="toggleCart()"></i>
        </div>
        <div id="cart-items-list"></div>
        <div class="sidebar-footer">
            <div class="total-box">Total: <span id="cart-total">0.00€</span></div>
            <button class="btn-pagar" onclick="confirmar()">Confirmar Pedido</button>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
